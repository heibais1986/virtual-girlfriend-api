<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Choose Your Companion | Virtual Girlfriend</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="css/landing.css" />
</head>
<body>
  <div class="landing-page">
    <!-- Background Effects -->
    <div class="bg-effects">
      <div class="bg-glow bg-glow--left"></div>
      <div class="bg-glow bg-glow--right"></div>
    </div>
    
    <!-- Header -->
    <header class="landing-header">
      <div class="header-logo">
        <span class="logo-text">VirtualGF</span>
      </div>
      <div class="header-actions">
        <button id="lang-switch" class="btn btn--ghost">EN/中</button>
        <button id="auth-btn" class="btn btn--outline">Login</button>
      </div>
    </header>
    
    <!-- Main Content -->
    <main class="landing-content">
      <!-- Hero Section -->
      <section class="hero-section">
        <h1 class="hero-title" data-i18n="heroTitle">Choose Your Companion</h1>
        <p class="hero-subtitle" data-i18n="heroSubtitle">选择你的虚拟伴侣，开始一段特别的对话</p>
      </section>
      
      <!-- Character Grid -->
      <section class="character-section">
        <div class="character-grid" id="character-grid">
          <!-- Characters will be rendered by JavaScript -->
        </div>
      </section>
    </main>
    
    <!-- Footer -->
    <footer class="landing-footer">
      <button id="skip-btn" class="btn btn--ghost btn--skip" data-i18n="skipBtn">
        Skip - Use Default Character
      </button>
      <p class="footer-text" data-i18n="footerText">Select a character to start chatting</p>
    </footer>
  </div>
  
  <script src="js/landing.js"></script>
</body>
</html>
